name: Pre-warm cache

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf "https://${DOMAIN}/api/cron" -H "Authorization: Bearer ${CRON_SECRET}"
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
